<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: linear-gradient(135deg, black, #8b0000);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: #111;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 25px red;
    width: 320px;
}

h2 {
    color: red;
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px;
    border: none;
    border-radius: 8px;
}

button {
    width: 95%;
    padding: 12px;
    background: red;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>👑 Admin Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button>Login</button>
    </form>
</div>

</body>
</html>
